<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tastmap — tactile map generator</title>
  </head>
  <body>
    <header>
      <h1>Tastmap</h1>
      <p>Generate a printable PDF from OpenStreetMap data, ready to turn into a tactile map on swell paper (Schwellpapier).</p>
    </header>

    <main>
      <form id="map-form" novalidate>
        <fieldset>
          <legend>Location</legend>
          <p id="picker-help">Drag the marker or click the map to choose the centre of the map.</p>
          <div id="picker" role="application" aria-label="Map location picker" aria-describedby="picker-help"></div>
          <div class="row">
            <span class="field">
              <label for="lat">Latitude</label>
              <input id="lat" name="lat" type="number" step="any" inputmode="decimal" autocomplete="off" />
            </span>
            <span class="field">
              <label for="lng">Longitude</label>
              <input id="lng" name="lng" type="number" step="any" inputmode="decimal" autocomplete="off" />
            </span>
          </div>
        </fieldset>

        <fieldset>
          <legend>Map settings</legend>
          <div class="row">
            <span class="field">
              <label for="scale">Scale 1:</label>
              <input id="scale" name="scale" type="number" min="100" step="100" value="1500" />
            </span>
            <span class="field">
              <label for="margin">Margin (mm)</label>
              <input id="margin" name="margin" type="number" min="0" step="1" value="10" />
            </span>
            <span class="field">
              <label for="paper">Paper size</label>
              <select id="paper" name="paper">
                <option value="A4" selected>A4</option>
                <option value="A3">A3</option>
              </select>
            </span>
            <span class="field">
              <label for="style">Style</label>
              <select id="style" name="style"></select>
            </span>
          </div>
          <div class="row">
            <span class="field grow">
              <label for="title">Title (optional)</label>
              <input id="title" name="title" type="text" autocomplete="off" placeholder="e.g. Marburg Altstadt" />
            </span>
          </div>
          <fieldset class="orientation">
            <legend>Orientation</legend>
            <label><input type="radio" name="orientation" value="portrait" checked /> Portrait</label>
            <label><input type="radio" name="orientation" value="landscape" /> Landscape</label>
          </fieldset>
        </fieldset>

        <p class="field checkbox">
          <label><input type="checkbox" id="ghost" /> Ghost text (text → empty boxes, for fusing — print the normal version as the key)</label>
        </p>
        <div class="actions">
          <button type="submit" id="generate">Generate PDF</button>
          <button type="button" id="calibrate">Calibration sheet</button>
          <button type="button" id="testsheets">Test sheets</button>
        </div>
      </form>

      <section aria-labelledby="result-heading">
        <h2 id="result-heading">Result</h2>
        <p id="status" role="status" aria-live="polite"></p>
        <p><a id="download" download="tastmap.pdf" hidden>Download PDF</a></p>
        <iframe id="preview" title="PDF preview" aria-label="PDF preview"></iframe>
      </section>
    </main>

    <footer>
      <p>Map data © OpenStreetMap contributors (ODbL).</p>
    </footer>

    <script type="module" src="/src/ui/main.ts"></script>
  </body>
</html>
