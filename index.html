<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tastmap — tactile map generator</title>
  </head>
  <body>
    <main>
      <form id="map-form" novalidate>
        <fieldset>
          <legend>Paper Setup</legend>
          <div class="row">
            <span class="field">
              <label for="paper">Paper size</label>
              <select id="paper" name="paper">
                <option value="A4" selected>A4</option>
                <option value="A3">A3</option>
              </select>
            </span>
            <span class="field">
              <label for="margin">Margin (mm)</label>
              <input id="margin" name="margin" type="number" min="0" step="1" value="5" />
            </span>
            <span class="field">
              <label for="orientation">Orientation</label>
              <select id="orientation" name="orientation">
                <option value="portrait" selected>Portrait</option>
                <option value="landscape">Landscape</option>
              </select>
            </span>
          </div>
        </fieldset>

        <fieldset>
          <legend>Map Area</legend>
          <p id="picker-help">Search for an address, or drag the marker / click the map to choose the centre.</p>
          <div class="row">
            <span class="field grow">
              <label for="search">Address search</label>
              <input id="search" name="search" type="text" autocomplete="off" placeholder="e.g. Marktplatz, Marburg" />
            </span>
            <span class="field">
              <label aria-hidden="true">&nbsp;</label>
              <button type="button" id="searchbtn">Search</button>
            </span>
          </div>
          <div class="row">
            <span class="field">
              <label for="scale">Scale 1:</label>
              <input id="scale" name="scale" type="number" min="100" step="100" value="1500" />
            </span>
          </div>
          <div id="picker" role="application" aria-label="Map location picker" aria-describedby="picker-help"></div>
        </fieldset>

        <fieldset>
          <legend>Map Style</legend>
          <div class="row">
            <span class="field">
              <label for="style">Style</label>
              <select id="style" name="style"></select>
            </span>
            <span class="field grow">
              <label for="title">Title (optional)</label>
              <input id="title" name="title" type="text" autocomplete="off" placeholder="e.g. Marburg Altstadt" />
            </span>
          </div>
        </fieldset>

        <div class="actions">
          <button type="submit" id="generate">Generate PDF</button>
          <button type="button" id="testsheets">Test sheets</button>
        </div>
      </form>

      <section aria-labelledby="result-heading">
        <h2 id="result-heading">Result</h2>
        <p id="status" role="status" aria-live="polite"></p>
        <ul id="roads" class="roads" aria-label="Roads in this section"></ul>
        <p><a id="download" download="tastmap.pdf" hidden>Download PDF</a></p>
        <iframe id="preview" title="PDF preview" aria-label="PDF preview"></iframe>
      </section>
    </main>

    <footer>
      <p>Map data © OpenStreetMap contributors (ODbL).</p>
    </footer>

    <script type="module" src="/src/ui/main.ts"></script>
  </body>
</html>
